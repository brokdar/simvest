name: CI

on:
  pull_request:

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simvest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: simvest/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "**/*.{ts,tsx}"

      - name: Unit & integration tests
        run: npm run test
