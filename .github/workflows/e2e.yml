name: E2E

on:
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: Playwright / ${{ matrix.project }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: simvest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: chromium-desktop
            browser: chromium
          - project: mobile-safari
            browser: webkit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: simvest/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ hashFiles('simvest/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: npm run test:e2e -- --project=${{ matrix.project }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            simvest/playwright-report/
            simvest/test-results/
          retention-days: 7
